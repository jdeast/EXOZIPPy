[project]
name = "exozippy"
version = "0.1.0"
description = "general modeling code"
authors = [
    {name = "jason.eastman@cfa.harvard.edu"}
]
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pytensor (>=2.20.0)",
    "pandas (>=1.3.6,<3.0.0)",
    "arviz (<0.20.0)",
    "numpy (<2)",
    "pymc (>=5.10.0)",
    "pyyaml (>=6.0.3,<7.0.0)",
    "matplotlib (>=3.10.9,<4.0.0)",
    "astropy (>=7.2.0,<8.0.0)",
    "celerite (>=0.4.3,<0.5.0)",
    "corner (>=2.2.3,<3.0.0)",
    "mulensmodel (>=3.9.0,<4.0.0)",
    "jplephem (>=2.24,<3.0)",
    "lightkurve (>=2.6.0,<3.0.0)",
    "exoplanet-core[pymc] (>=0.3.1)",
    "click (>=8.3.3,<9.0.0)",
    "h5py (>=3.16.0,<4.0.0)"
]


[project.optional-dependencies]
true = ["jax (<0.5.0)", "jaxlib (<0.5.0)", "numpyro (<0.16.0)"]
[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.dependencies]
mkl = { version = "^2023.0", markers = "sys_platform == 'win32'" }
mkl-include = { version = "^2023.0", markers = "sys_platform == 'win32'" }
[dependency-groups]
dev = [
    "ipdb (>=0.13.13,<0.14.0)",
    "pytest (>=9.0.3,<10.0.0)",
    "pre-commit (>=4.6.0,<5.0.0)",
    "ipykernel (>=7.2.0,<8.0.0)"
]

[tool.poetry.scripts]
exozippy = "exozippy.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["exozippy_legacy", "exozippy", "src"]

[tool.poetry]
packages = [{include = "exozippy", from = "src"}]