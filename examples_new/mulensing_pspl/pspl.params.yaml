# examples_new/microlensing_pspl/pspl.params.yaml

# Lens Parameters (Sampled)
lens.0.t0:
    initval: 2455379.571
    init_scale: 0.01
lens.0.u0:
    initval: 0.523
    init_scale: 0.05
lens.0.tE:
    initval: 17.94
    init_scale: 1.0

# Parallax (Initialized to zero if you want to test the "no parallax" case first)
lens.0.pi_E_N:
    initval: 0.0
    init_scale: 0.05
lens.0.pi_E_E:
    initval: 0.0
    init_scale: 0.05

# Instrument Parameters (Sampled)
# Flux = fs * A + fb. Magnitudes are calculated via -2.5*log10(Flux)
mulens.0.f_source:
    initval: 1.0
    init_scale: 0.1
mulens.0.f_blend:
    initval: 0.0
    init_scale: 0.1