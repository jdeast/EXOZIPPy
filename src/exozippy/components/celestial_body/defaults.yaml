# Shared DNA for Stars, Planets, Moons, etc.
mass:
  lower: 1e-9
  upper: 500.0
  initval: 1.0
  init_scale: 0.1
  unit: "solMass"
  internal_unit: "solMass"
  latex: "M"
  description: "Mass"

radius:
  lower: 1e-9
  upper: 5000.0
  initval: 1.0
  init_scale: 0.1
  unit: "solRad"
  internal_unit: "solRad"
  latex: "R"
  description: "Radius"

density:
  unit: "g/cm3"
  internal_unit: "solMass/solRad3"
  latex: "\\rho"
  description: "Density"
  expressions:
    default:
      func_name: "calc_density"
      deps: ["mass", "radius"]

logg:
  unit: "dex(cm/s2)"
  internal_unit: "dex(cm/s2)"
  latex: "\\log{g}"
  description: "Surface Gravity"
  expressions:
    default:
      func_name: "calc_logg"
      deps: ["mass", "radius"]