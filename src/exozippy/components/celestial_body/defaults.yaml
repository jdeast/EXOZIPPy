# Shared DNA for Stars, Planets, Moons, etc.
mass:
  lower: 1e-9
  upper: 500.0
  initval: 1.0
  init_scale: 0.1
  unit: "solMass"
  internal_unit: "solMass"
  latex: "M"
  description: "Mass"

radius:
  lower: 1e-9
  upper: 5000.0
  initval: 1.0
  init_scale: 0.1
  unit: "solRad"
  internal_unit: "solRad"
  latex: "R"
  description: "Radius"

density:
  unit: "g/cm3"
  internal_unit: "solMass/solRad3"
  latex: "\\rho"
  description: "Density"
  expressions:
    default:
      func_name: "calc_density"
      deps: ["mass", "radius"]

logg:
  unit: "dex(cm/s2)"
  internal_unit: "dex(cm/s2)"
  latex: "\\log{g}"
  description: "Surface Gravity"
  expressions:
    default:
      func_name: "calc_logg"
      deps: ["mass", "radius"]

distance:
  lower: 0.001
  upper: 100000.0
  initval: 10.0
  init_scale: 0.1
  unit: "pc"
  internal_unit: "pc"
  latex: "D"
  description: "Distance"

pm_ra:
  initval: 0.0
  unit: "mas/yr"
  internal_unit: "mas/yr"
  latex: "\\mu_{\\alpha*}"
  description: "Proper Motion (RA)"

pm_dec:
  initval: 0.0
  unit: "mas/yr"
  internal_unit: "mas/yr"
  latex: "\\mu_\\delta"
  description: "Proper Motion (Dec)"