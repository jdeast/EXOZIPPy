star:
  # --- Sampled Parameters ---
  mass:
    lower: 0.1
    upper: 250.0
    init_scale: 0.02
    latex: "M_*"
    description: "Stellar Mass"
  radius:
    lower: 0.1
    upper: 2000.0
    init_scale: 0.02
    latex: "R_*"
    description: "Stellar Radius"
  radiussed:
    lower: 0.1
    upper: 2000.0
    initval: 1.0
    init_scale: 0.02
    unit: "solRad"
    internal_unit: "solRad"
    latex: "R_*"
    description: "Stellar Radius"
    table_note: "This value ignores the systematic error and is for reference only"
  teff:
    lower: 1.0
    upper: 500000.0
    initval: 5778.0
    init_scale: 80.0
    unit: "K"
    internal_unit: "K"
    latex: "T_{\\rm eff}"
    description: "Effective Temperature"
  teffsed:
    lower: 1.0
    upper: 500000.0
    initval: 5778.0
    init_scale: 80.0
    unit: "K"
    internal_unit: "K"
    latex: "T_{\\rm eff}"
    description: "Effective Temperature"
    table_note: "This value ignores the systematic error and is for reference only"
  feh:
    lower: -5.0
    upper: 5.0
    initval: 0.0
    init_scale: 0.08
    unit: "dex"
    internal_unit: "dex"
    latex: "[{\\rm Fe/H}]"
    description: "Metallicity"
  age:
    lower: 0.0
    upper: 13.77
    initval: 4.603
    init_scale: 3.0
    unit: "Gyr"
    internal_unit: "Gyr"
    latex: "{\\rm Age}"
    description: "Stellar Age"

  # --- Derived Parameters ---
  # We inherit the math from CelestialBody, but override the LaTeX here
  density:
    latex: "\\rho_*"
    description: "Stellar Density"
  logg:
    latex: "\\log{g_*}"

  # --- Specific Physics ---
  fbol:
    unit: "erg s-1 cm-2"
    internal_unit: "erg s-1 cm-2"
    latex: "F_{Bol}"
    description: "Bolometric Flux"
    expressions:
      default:
        func_name: "calc_fbol"
        deps: ["luminosity", "distance"]
  luminosity:
    unit: "solLum"
    internal_unit: "solLum"
    latex: "L_*"
    description: "Stellar Luminosity"
    expressions:
      default:
        func_name: "calc_luminosity"
        deps: ["radius", "teff"]
  luminositysed:
    unit: "solLum"
    internal_unit: "solLum"
    latex: "L_*"
    description: "Stellar Luminosity"
    expressions:
      default:
        func_name: "calc_luminosity"
        deps: ["radiussed", "teffsed"]
  fbolsed:
    unit: "erg s-1 cm-2"
    internal_unit: "erg s-1 cm-2"
    latex: "F_{Bol}"
    description: "Bolometric Flux"
    expressions:
      default:
        func_name: "calc_fbol"
        deps: ["luminositysed", "distance"]
  pm_ra:
    initval: 0.0
    init_scale: 0.05
    lower: -1e5
    upper: 1e5
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{\\alpha*}"
    description: "Proper Motion (RA)"
  pm_dec:
    initval: 0.0
    init_scale: 0.05
    lower: -1e5
    upper: 1e5
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_\\delta"
    description: "Proper Motion (Dec)"
  ra:
    initval: 180.0
    init_scale: 20e-6
    lower: 0.0
    upper: 360.0
    unit: "deg"
    internal_unit: "rad"
    latex: "\\alpha_{ICRS}"
    description: "Right Ascension"
  dec:
    initval: 0.0
    init_scale: 20e-6
    lower: -90
    upper: 90.0
    unit: "deg"
    internal_unit: "rad"
    latex: "\\delta_{ICRS}"
    description: "Declination"
  rv:
    initval: 0.0
    init_scale: 100
    lower: -3e8
    upper: 3e8
    unit: "m/s"
    internal_unit: "m/s"
    latex: "\\gamma_{\\rm abs}"
    description: "Absolute Radial Velocity"
  parallax:
    unit: "mas"
    internal_unit: "mas"
    latex: "\\varpi"
    description: "Parallax"
    expressions:
      default:
        func_name: "calc_parallax"
        deps: [ "distance" ]
  appks:
    initval: 10.0
    init_scale: 0.02
    lower: -30.0 # the Sun is -28.29
    upper: 50.0
    unit: "mag"
    internal_unit: "mag"
    latex: "m_{K_s}"
    description: "Apparent Ks magnitude"
  absks:
    unit: "mag"
    internal_unit: "mag"
    latex: "M_{K_s}"
    description: "Absolute Ks magnitude"
    expressions:
      default:
        func_name: "calc_absmag"
        deps: ["appks", "distance"]
