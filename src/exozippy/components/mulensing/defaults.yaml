lens:
  t_0:
    unit: "d"
    lower: 2400000
    upper: 3000000
    init_scale: 0.01
    internal_unit: "d"
    latex: "t_0"
    description: "Time of peak magnification"
  u_0:
    unit: ""
    lower: -18 # ~20 ppm peak magnification
    upper: 18 # ~20 ppm peak magnification
    init_scale: 0.01
    internal_unit: ""
    latex: "u_0"
    description: "Impact parameter (Einstein radii)"
  t_E:
    lower: 0.0
    unit: "d"
    internal_unit: "d"
    latex: "t_E"
    description: "Einstein crossing time"
    debug_print: true
    expressions:
      default:
        func_name: "calc_t_E"
        deps: [ "theta_E", "mu_rel_mag" ]
  pi_E_N:
    initval: 0.0
    unit: ""
    internal_unit: ""
    latex: "\\pi_{\rm E,N}"
    description: "Parallax vector (North)"
    debug_print: true
    expressions:
      default:
        func_name: "calc_pi_E_N"
        deps: [ "pi_rel", "theta_E", "mu_dec_rel", "mu_rel_mag" ]
  pi_E_E:
    initval: 0.0
    unit: ""
    internal_unit: ""
    latex: "\\pi_{\rm E,E}"
    description: "Parallax vector (East)"
    debug_print: true
    expressions:
      default:
        func_name: "calc_pi_E_E"
        deps: [ "pi_rel", "theta_E", "mu_ra_rel", "mu_rel_mag" ]
  pi_rel:
    lower: 0.0
    upper: 10000
    unit: "mas"
    internal_unit: "mas"
    latex: "\\pi_{rel}"
    description: "Relative lens-source parallax"
    expressions:
      default:
        func_name: "calc_pi_rel"
        deps: [ "star.distance[lens_map]", "star.distance[source_map]"]
  theta_E:
    lower: 0.0
    upper: 1000.0
    unit: "mas"
    internal_unit: "mas"
    latex: "\\theta_E"
    description: "Einstein angular radius"
    expressions:
      default:
        func_name: "calc_theta_E"
        deps: [ "star.mass[lens_map]", "pi_rel" ]
  mu_ra_rel:
    lower: -10000.0
    upper: 10000.0
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{\\alpha,rel}"
    description: "Relative lens-source proper motion (RA)"
    expressions:
      default:
        func_name: "calc_mu_ra_rel"
        deps: [ "star.pm_ra[lens_map]", "star.pm_ra[source_map]" ]
  mu_dec_rel:
    lower: -10000.0
    upper: 10000.0
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{\\delta,rel}"
    description: "Relative lens-source proper motion (Dec)"
    expressions:
      default:
        func_name: "calc_mu_dec_rel"
        deps: [ "star.pm_dec[lens_map]", "star.pm_dec[source_map]" ]
  mu_rel_mag:
    lower: 0.0
    upper: 10000
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{rel}"
    description: "Relative lens-source proper motion"
    expressions:
      default:
        func_name: "calc_mu_rel_mag"
        deps: ["mu_ra_rel", "mu_dec_rel"]
  rho:
    unit: ""
    internal_unit: ""
    latex: "\\rho"
    description: 'Source radius (Einstein radii)'
    expressions:
      default:
        func_name: "calc_rho"
        deps: [ "star.radius[source_map]", "star.distance[source_map]", "theta_E" ]
  # Binary lens parameters (N_lenses - 1 per event)
  q:
    lower: 0.0
    upper: 1.0
    init_scale: 0.01
    sigma: 0
    unit: ""
    internal_unit: ""
    latex: "q"
    description: "Binary lens mass ratio M_companion / M_primary"
    debug_print: true
  alpha:
    unit: "deg"
    internal_unit: "rad"
    latex: "\\alpha"
    description: "Source trajectory angle"
    debug_print: true
    expressions:
      default:
        func_name: "calc_alpha"
        deps: [ "cosalpha", "sinalpha" ]
  s:
    lower: 0.001
    upper: 1000.0
    initval: 1.0
    init_scale: 0.05
    unit: ""
    internal_unit: ""
    latex: "s"
    description: "Projected binary separation (Einstein radii)"
  cosalpha:
    lower: -100.0
    upper: 100.0
    initval: 0.0
    init_scale: 0.01
    mu: 0.0
    sigma: 1.0
    unit: ""
    internal_unit: ""
    latex: "\\cos\\alpha"
    description: "cos of source trajectory angle"
  sinalpha:
    lower: -100.0
    upper: 100.0
    initval: 0.0
    init_scale: 0.01
    mu: 0.0
    sigma: 1.0
    unit: ""
    internal_unit: ""
    latex: "\\sin\\alpha"
    description: "sin of source trajectory angle"
mulensinstrument:
  log_f_total:
    initval: -6
    init_scale: 3e-4
    lower: -100
    upper: 10.0
    unit: ""
    internal_unit: ""
    latex: "\\log{(f_s + f_b)}"
    description: "log of baseline flux (Source + Blend)"
  q_source:
    initval: 0.95
    init_scale: 0.05
    lower: 0.0
    upper: 2.0
    unit: ""
    internal_unit: ""
    latex: "q_s"
    description: "Source fraction f_source / f_total"
  f_source:
    lower: 0.0
    upper: 1000.0
    unit: ""
    internal_unit: ""
    latex: "f_s"
    description: "Source flux"
    expressions:
      default:
        func_name: "calc_f_source"
        deps: [ "log_f_total", "q_source" ]
  f_blend:
    lower: -1000.0
    upper: 1000.0
    unit: ""
    internal_unit: ""
    latex: "f_b"
    description: "Blend flux"
    expressions:
      default:
        func_name: "calc_f_blend"
        deps: [ "log_f_total", "q_source" ]
  err_scale:
    initval: 1.0
    init_scale: 0.1
    lower: 1e-6
    upper: 1e6
    unit: ""
    internal_unit: ""
    latex: "k"
    description: "Error scaling factor"