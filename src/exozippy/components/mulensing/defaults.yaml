lens:
  t_0:
    unit: "d"
    lower: 2400000
    upper: 3000000
    init_scale: 0.01
    internal_unit: "d"
    latex: "t_0"
    description: "Time of peak magnification"
  u_0:
    unit: ""
    lower: -18 # ~20 ppm peak magnification
    upper: 18 # ~20 ppm peak magnification
    init_scale: 0.01
    internal_unit: ""
    latex: "u_0"
    description: "Impact parameter (Einstein radii)"
  t_E:
    lower: 0.0
    unit: "d"
    internal_unit: "d"
    latex: "t_E"
    description: "Einstein crossing time"
    debug_print: true
    expressions:
      default:
        func_name: "calc_t_E"
        deps: [ "theta_E", "mu_rel_mag" ]
  pi_E_N:
    initval: 0.0
    unit: ""
    internal_unit: ""
    latex: "\\pi_{\rm E,N}"
    description: "Parallax vector (North)"
    debug_print: true
    expressions:
      default:
        func_name: "calc_pi_E_N"
        deps: [ "pi_rel", "theta_E", "mu_dec_rel", "mu_rel_mag" ]
  pi_E_E:
    initval: 0.0
    unit: ""
    internal_unit: ""
    latex: "\\pi_{\rm E,E}"
    description: "Parallax vector (East)"
    debug_print: true
    expressions:
      default:
        func_name: "calc_pi_E_E"
        deps: [ "pi_rel", "theta_E", "mu_ra_rel", "mu_rel_mag" ]
  pi_rel:
    lower: 0.0
    upper: 10000
    unit: "mas"
    internal_unit: "mas"
    latex: "\\pi_{rel}"
    description: "Relative lens-source parallax"
    expressions:
      default:
        func_name: "calc_pi_rel"
        deps: [ "star.distance[lens_map]", "star.distance[source_map]"]
  theta_E:
    lower: 0.0
    upper: 1000.0
    unit: "mas"
    internal_unit: "mas"
    latex: "\\theta_E"
    description: "Einstein angular radius"
    expressions:
      default:
        func_name: "calc_theta_E"
        deps: [ "star.mass[lens_map]", "pi_rel" ]
  mu_ra_rel:
    lower: -10000.0
    upper: 10000.0
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{\\alpha,rel}"
    description: "Relative lens-source proper motion (RA)"
    expressions:
      default:
        func_name: "calc_mu_ra_rel"
        deps: [ "star.pm_ra[lens_map]", "star.pm_ra[source_map]" ]
  mu_dec_rel:
    lower: -10000.0
    upper: 10000.0
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{\\delta,rel}"
    description: "Relative lens-source proper motion (Dec)"
    expressions:
      default:
        func_name: "calc_mu_dec_rel"
        deps: [ "star.pm_dec[lens_map]", "star.pm_dec[source_map]" ]
  mu_rel_mag:
    lower: 0.0
    upper: 10000
    unit: "mas/yr"
    internal_unit: "mas/yr"
    latex: "\\mu_{rel}"
    description: "Relative lens-source proper motion"
    expressions:
      default:
        func_name: "calc_mu_rel_mag"
        deps: ["mu_ra_rel", "mu_dec_rel"]
  rho:
    # Soft upper barrier only: real events have rho <~ 0.5, and rho >~ a few
    # both erases the microlensing signal (A -> 1) and drives VBM's
    # finite-source machinery into its most expensive regime (see the
    # eval_timeout analysis in the DC2018_128 example).  No lower bound:
    # rho > 0 by construction, and a barrier at 0 would bias small-rho fits.
    upper: 10.0
    unit: ""
    internal_unit: ""
    latex: "\\rho"
    description: 'Source radius (Einstein radii)'
    expressions:
      default:
        func_name: "calc_rho"
        deps: [ "star.radius[source_map]", "star.distance[source_map]", "theta_E" ]
  mlens_total:
    lower: 0.0
    upper: 500.0
    unit: "solMass"
    internal_unit: "solMass"
    latex: "M_{\\rm L,tot}"
    description: "Total lens mass (all bodies)"
    debug_print: true
    expressions:
      default:
        func_name: "calc_mlens_total"
        deps: [ "star.mass[lens_map]" ]  # overridden per-config with all lens bodies
  # Binary lens parameters (N_lenses - 1 per event)
  q:
    # Lower bound sits 10x below the most optimistic Roman detection floor
    # (~Moon mass, q ~ 1e-7 at 0.3 Msun); below it the companion is pure
    # nuisance volume with a likelihood flat in (s, alpha, q).  See
    # vbm_fix.txt section 6.
    lower: 1e-8
    upper: 100.0  # q > 1 is legal (companion more massive than the "primary"); MulensModel supports it
    unit: ""
    internal_unit: ""
    latex: "q"
    description: "Binary lens mass ratio (M_2 / M_1)"
    debug_print: true
    expressions:
      default:
        func_name: "calc_q"
        # overridden per-config: one scalar map per companion, primary last
        deps: ["planet.mass[companion0_mass_map]", "star.mass[primary_lens_map]"]
  alpha:
    unit: "deg"
    internal_unit: "rad"
    latex: "\\alpha"
    description: "Source trajectory angle"
    debug_print: true
    expressions:
      default:
        func_name: "calc_alpha"
        deps: [ "xalpha", "yalpha" ]
  # might want to parameterize this like Yee's that increases sampling at s=1
  s:
    # Bounds leave >~2x margin beyond every published solution (smallest
    # known ~0.3, widest ~5.3) while keeping tempering chains out of VBM's
    # expensive corners (see vbm_fix.txt section 6; the s=20 wall hosted the
    # extreme-magnification eval_timeout excursions in DC2018_128).  Events
    # genuinely needing s > 10 should override in their params file.
    lower: 0.1
    upper: 10.0
    initval: 1.0
    init_scale: 0.05
    unit: ""
    internal_unit: ""
    latex: "s"
    description: "Projected binary separation (Einstein radii)"
  xalpha:
    lower: -100.0
    upper: 100.0
    initval: 0.0
    init_scale: 0.01
    mu: 0.0
    sigma: 1.0
    unit: ""
    internal_unit: ""
    latex: "x_{\\alpha}"
    description: "x-component of trajectory angle direction (N(0,1) prior → uniform prior on alpha)"
  yalpha:
    lower: -100.0
    upper: 100.0
    initval: 0.0
    init_scale: 0.01
    mu: 0.0
    sigma: 1.0
    unit: ""
    internal_unit: ""
    latex: "y_{\\alpha}"
    description: "y-component of trajectory angle direction (N(0,1) prior → uniform prior on alpha)"
mulensinstrument:
  log_f_total:
    initval: -6
    init_scale: 3e-4
    lower: -100
    upper: 10.0
    unit: ""
    internal_unit: ""
    latex: "\\log{(f_s + f_b)}"
    description: "log of baseline flux (Source + Blend)"
  q_source:
    initval: 0.95
    init_scale: 0.05
    lower: 0.0
    upper: 2.0
    unit: ""
    internal_unit: ""
    latex: "q_s"
    description: "Source fraction f_s / (f_s + f_b)"
  q_flux:
    initval: 1.0
    init_scale: 0.1
    lower: 0.0
    upper: 1000.0
    unit: ""
    internal_unit: ""
    latex: "q_F"
    description: "Binary source flux ratio (f_s2 / f_s1)"
  f_source:
    lower: 0.0
    upper: 1000.0
    unit: ""
    internal_unit: ""
    latex: "f_s"
    description: "Source flux"
    expressions:
      default:
        func_name: "calc_f_source"
        deps: [ "log_f_total", "q_source" ]
  f_blend:
    lower: -1000.0
    upper: 1000.0
    unit: ""
    internal_unit: ""
    latex: "f_b"
    description: "Blend flux"
    expressions:
      default:
        func_name: "calc_f_blend"
        deps: [ "log_f_total", "q_source" ]
  err_scale:
    initval: 1.0
    init_scale: 0.1
    lower: 1e-6
    upper: 1e6
    unit: ""
    internal_unit: ""
    latex: "k"
    description: "Error scaling factor"