planet:
  mass:
    initval: 1.0
    init_scale: 0.1
    lower: -1000.0
    upper: 260000.0
    unit: "jupiterMass"
    internal_unit: "solMass"
    latex: "M_P"
    description: "planet mass"
    rank: 10 # rank < 20 makes this the first to be overwritten if we have a constraint from somewhere else (e.g., K estimate)
  density:
    unit: "g/cm3"
    internal_unit: "solMass/solRad3"
    latex: "\\rho_P"
    description: "Density"
    expressions:
      default:
        func_name: "calc_density"
        deps: ["mass", "radius"]

  logg:
    unit: "dex(cm/s2)"
    internal_unit: "dex(cm/s2)"
    latex: "\\log{g_P}"
    description: "Surface Gravity"
    expressions:
      default:
        func_name: "calc_logg_from_mass"
        deps: ["mass", "radius"]

  distance:
    lower: 0.001
    upper: 100000.0
    initval: 10.0
    init_scale: 0.1
    unit: "pc"
    internal_unit: "pc"
    latex: "D"
    description: "Distance"
  radius:
    unit: "jupiterRad"
    lower: 0.000001
    upper: 100.0
    initval: 1.0
    init_scale: 0.1
    rank: 10
    internal_unit: "solRad"
    latex: "R_P"
    description: "planet radius"
  p:
    unit: ""
    internal_unit: ""
    latex: "R_P/R_*"
    description: "Radius Ratio"
    expressions:
      default:
        func_name: "calc_p"
        deps: ["radius", "star.radius"]

  K:
    unit: "m/s"
    internal_unit: "solRad/d"
    latex: "K"
    description: "Velocity Semi-amplitude"
    expressions:
      default:
        func_name: "calc_K"
        deps: ["mass", "m_total", "orbit.ecc", "arsun", "orbit.sini", "orbit.period"]
  arsun:
    unit: "solRad"
    internal_unit: "solRad"
    latex: "a"
    expressions:
      default:
        func_name: "calc_arsun"
        deps: ["m_total", "orbit.period"]
  ar:
    unit: ""
    internal_unit: ""
    latex: "a/R_*"
    expressions:
      default:
        func_name: "calc_arstar"
        deps: ["arsun", "star.radius"]
  b:
    unit: ""
    internal_unit: ""
    latex: "b"
    expressions:
      default:
        func_name: "calc_b"
        deps: ["ar", "orbit.cosi", "orbit.ecc", "orbit.esinw"]
  m_total:
    internal_unit: "solMass"
    unit: "solMass"
    latex: "M_{\\rm tot}"
    description: "Total System Mass"
    expressions:
      default:
        func_name: "calc_m_total"
        deps: ["mass", "star.mass"]
  max_ecc:
    unit: ""
    internal_unit: ""
    latex: "e_{\\rm max}"
    description: "Collision Eccentricity Limit"
    expressions:
      default:
        func_name: "calc_max_ecc"
        deps: ["ar", "p"]