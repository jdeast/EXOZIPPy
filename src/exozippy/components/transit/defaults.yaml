transit:
  baseline:
    lower: -1000000.0
    upper: 1000000.0
    init_scale: 0.01
    unit: ""
    internal_unit: ""
    latex: "F_0"
    description: "Relative flux baseline"
  jitter_variance:
    lower: -1000.0
    upper: 100000.0
    initval: 0.0
    init_scale: 0.000001
    unit: ""
    internal_unit: ""
    latex: "\\sigma_J^2"
    description: "Photometric Jitter variance"
  jitter:
    unit: ""
    internal_unit: ""
    latex: "\\sigma_J"
    description: "Photometric Jitter"
    expressions:
      default:
        func_name: "calc_transit_jitter"
        deps: [ "jitter_variance" ]
  # Limb darkening lives on the Band component (band: reference per
  # instrument); see components/band/defaults.yaml.
  detrend_coeffs:
    initval: 0.0
    init_scale: 1.0
    lower: -1.0e6
    upper: 1.0e6
    unit: ""
    internal_unit: ""
    latex: "c"
    description: "Detrending Coefficients"