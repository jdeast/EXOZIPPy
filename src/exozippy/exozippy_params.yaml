# =============================================================================
# EXOZIPPy Master Parameter Defaults
# This is not intended to be edited by the user.
# Defines physical limits, metadata, and derivation recipes for all components.
# The user_parameter file can overwrite anything in here that should be overridden
# =============================================================================

star:
  # --- Sampled Parameters ---
  mass:
    lower: 0.1
    upper: 250.0
    initval: 1.0
    init_scale: 0.02
    unit: "solMass"
    internal_unit: "solMass"
    latex: "M_*"
    description: "Stellar Mass"
  radius:
    lower: 0.1
    upper: 2000.0
    initval: 1.0
    init_scale: 0.02
    unit: "solRad"
    internal_unit: "solRad"
    latex: "R_*"
    description: "Stellar Radius"
  radiussed:
    lower: 0.1
    upper: 2000.0
    initval: 1.0
    init_scale: 0.02
    unit: "solRad"
    internal_unit: "solRad"
    latex: "R_*"
    description: "Stellar Radius"
    table_note: "This value ignores the systematic error and is for reference only"
  teff:
    lower: 1.0
    upper: 500000.0
    initval: 5778.0
    init_scale: 80.0
    unit: "K"
    internal_unit: "K"
    latex: "T_{\\rm eff}"
    description: "Effective Temperature"
  teffsed:
    lower: 1.0
    upper: 500000.0
    initval: 5778.0
    init_scale: 80.0
    unit: "K"
    internal_unit: "K"
    latex: "T_{\\rm eff}"
    description: "Effective Temperature"
    table_note: "This value ignores the systematic error and is for reference only"
  feh:
    lower: -5.0
    upper: 5.0
    initval: 0.0
    init_scale: 0.08
    unit: "dex"
    internal_unit: "dex"
    latex: "[{\\rm Fe/H}]"
    description: "Metallicity"
  age:
    lower: 0.0
    upper: 13.77
    initval: 4.603
    init_scale: 3.0
    unit: "Gyr"
    internal_unit: "Gyr"
    latex: "{\\rm Age}"
    description: "Stellar Age"

  # --- Derived Parameters ---
  density:
    unit: "g/cm3"
    internal_unit: "solMass/solRad3"
    latex: "\\rho_*"
    description: "Stellar Density"
    expressions:
      default:
        func_name: "calc_density"
        deps: ["mass", "radius"]
  logg:
    unit: "dex(cm/s2)"
    internal_unit: "dex(cm/s2)"
    latex: "\\log{g_*}"
    description: "Surface Gravity"
    expressions:
      default:
        func_name: "calc_logg"
        deps: ["mass", "radius"]
  fbol:
    unit: "erg/s/cm2"
    internal_unit: "erg/s/cm2"
    latex: "F_{Bol}"
    description: "Bolometric Flux"
    expressions:
      default:
        func_name: "calc_fbol"
        deps: ["luminosity", "distance"]
  luminosity:
    unit: "solLum"
    internal_unit: "solLum"
    latex: "L_*"
    description: "Stellar Luminosity"
    expressions:
      default:
        func_name: "calc_luminosity"
        deps: ["radius", "teff"]
  luminositysed:
    unit: "solLum"
    internal_unit: "solLum"
    latex: "L_*"
    description: "Stellar Luminosity"
    expressions:
      default:
        func_name: "calc_luminosity"
        deps: ["radiussed", "teffsed"]
  fbolsed:
    unit: "erg/s/cm2"
    internal_unit: "erg/s/cm2"
    latex: "F_{Bol}"
    description: "Bolometric Flux"
    expressions:
      default:
        func_name: "calc_fbol"
        deps: ["luminositysed", "distance"]
planet:
  # --- Sampled Parameters ---
  radius:
    lower: 0.000001
    upper: 100.0
    initval: 1.0
    init_scale: 0.05
    unit: "jupiterRad"
    internal_unit: "solRad"
    latex: "R_P"
    description: "Planet Radius"
  mass:
    lower: -1000.0
    upper: 260000.0
    initval: 1.0
    init_scale: 0.1
    unit: "jupiterMass"
    internal_unit: "solMass"
    latex: "M_P"
    description: "Planet Mass"

  # --- Internal Derived Parameters ---
  density:
    unit: "g/cm3"
    internal_unit: "solMass/solRad3"
    latex: "\\rho_P"
    expressions:
      default:
        func_name: "calc_density"
        deps: ["mass", "radius"]
  logg:
    unit: "dex(cm/s2)"
    internal_unit: "dex(cm/s2)"
    latex: "\\log{g_P}"
    expressions:
      default:
        func_name: "calc_logg"
        deps: ["mass", "radius"]

  # --- Cross-Component Derived Parameters (No expressions block needed) ---
  p:
      unit: ""
      internal_unit: ""
      latex: "R_P/R_*"
      description: "Radius Ratio"
      expressions:
        default:
          func_name: "calc_p"
          deps: ["radius", "star_radius"]
  arsun:
      unit: "solRad"
      internal_unit: "solRad"
      latex: "a"
      expressions:
        default:
          func_name: "calc_arsun"
          deps: ["m_total", "orbit_period"]
  ar:
    unit: ""
    internal_unit: ""
    latex: "a/R_*"
    expressions:
      default:
        func_name: "calc_arstar"
        deps: ["arsun", "star_radius"]
  b:
    unit: ""
    internal_unit: ""
    latex: "b"
    expressions:
      default:
        func_name: "calc_b"
        deps: ["ar", "orbit_cosi", "orbit_ecc", "orbit_esinw"]
  K:
    unit: "m/s"
    internal_unit: "solRad/d"
    latex: "K"
    expressions:
      default:
        func_name: "calc_K"
        deps: ["mass", "m_total", "orbit_ecc", "arsun", "orbit_sini", "orbit_period"]
orbit:
  # --- Always Sampled ---
  logP:
    lower: -2.0
    upper: 13.7
    initval: 1.0
    init_scale: 0.00001
    unit: "dex(d)"
    internal_unit: "dex(d)"
    latex: "\\log{P}"
    description: "log10(Period/day)"
  period:
    unit: "d"
    internal_unit: "d"
    latex: "P"
    description: "Orbital Period"
    expressions:
      default:
        func_name: "calc_period"
        deps: [ "logP" ]
  n:
    unit: "1/d"
    internal_unit: "1/d"
    latex: "n"
    description: "Mean Motion"
    expressions:
      default:
        func_name: "calc_n"
        deps: [ "period" ]
  tc:
    lower: 2000000.0
    upper: 3000000.0
    initval: 2460000.0
    init_scale: 0.001
    unit: "d"
    internal_unit: "d"
    latex: "T_C"
    description: "Time of Conjunction"

  # --- Conditionally Sampled or Derived (Geometry Swap) ---
  secosw:
    lower: -1.0
    upper: 1.0
    initval: 0.01
    init_scale: 0.2
    unit: ""
    internal_unit: ""
    latex: "e^{1/2}\\cos{\\omega_*}"
  sesinw:
    lower: -1.0
    upper: 1.0
    initval: 0.01
    init_scale: 0.2
    unit: ""
    internal_unit: ""
    latex: "e^{1/2}\\sin{\\omega_*}"
  vcve:
    lower: -10.0  # Adjust based on expected Vc/Ve scaling
    upper: 10.0
    initval: 0.0
    init_scale: 0.1
    unit: ""
    internal_unit: ""
    latex: "V_C/V_E"
  # --- Derived/Switchboard Targets ---
  ecc:
    unit: ""
    internal_unit: ""
    latex: "e"
    description: "Eccentricity"
    expressions:
      default:
        func_name: "calc_ecc"
        deps: ["secosw", "sesinw"]
      from_vcve:
        func_name: "calc_ecc_from_vcve"
        deps: ["vcve", "omega"]
  omega:
    unit: "rad"
    internal_unit: "rad"
    latex: "\\omega_*"
    description: "Argument of Periastron"
    expressions:
      default:
        func_name: "calc_omega"
        deps: ["secosw", "sesinw"]
      from_vcve:
        func_name: "calc_omega_from_vcve"
        deps: ["cosw", "sinw"]
  cosi:
    lower: -1.0
    upper: 1.0
    initval: 0.0000001
    init_scale: 0.01
    unit: ""
    internal_unit: ""
    latex: "\\cos{i}"
    description: "Cosine of Inclination"
    expressions:
      from_b:
        func_name: "calc_cosi_from_b"
        deps: ["b", "ar", "ecc", "omega"]  # 'ar' (a/R*) would need to be computed prior
  b:
    initval: 0.5
    init_scale: 0.1
    unit: ""
    internal_unit: ""
    latex: "b"
    description: "Impact Parameter"
    expressions:
      default:
        func_name: "calc_b"
        deps: ["cosi", "ar", "ecc", "omega"]
  inc:
    unit: "deg"
    internal_unit: "rad"
    latex: "i"
    description: "Inclination"
    expressions:
      default:
        func_name: "calc_inc"
        deps: [ "cosi" ]
  sini:
    unit: ""
    internal_unit: ""
    latex: "\\sin{i}"
    expressions:
      default:
        func_name: "calc_sini"
        deps: [ "inc" ]
  sinw:
    unit: ""
    internal_unit: ""
    latex: "\\sin{\\omega_*}"
    expressions:
      default:
        func_name: "calc_sinw"
        deps: [ "omega" ]
  cosw:
    unit: ""
    internal_unit: ""
    latex: "\\cos{\\omega_*}"
    expressions:
      default:
        func_name: "calc_cosw"
        deps: [ "omega" ]
  esinw:
    unit: ""
    internal_unit: ""
    latex: "e\\sin{\\omega_*}"
    expressions:
      default:
        func_name: "calc_esinw"
        deps: [ "ecc", "sesinw" ]
  ecosw:
    unit: ""
    internal_unit: ""
    latex: "e\\cos{\\omega_*}"
    expressions:
      default:
        func_name: "calc_ecosw"
        deps: [ "ecc", "secosw" ]
  tp:
    unit: "d"
    internal_unit: "d"
    latex: "T_P"
    description: "Time of Periastron"
    expressions:
      default:
        func_name: "calc_tp"
        deps: [ "ecc", "sesinw", "secosw", "tc", "n" ]

inst:
  gamma:
    lower: -300000000.0
    upper: 300000000.0
    initval: 0.0
    init_scale: 3.0
    unit: "m/s"
    internal_unit: "solRad/d"
    latex: "\\gamma"
    description: "Relative RV Offset"
  jitter_variance:
    lower: -1000.0
    upper: 100000.0
    initval: 0.0
    init_scale: 1.0
    unit: "m2/s2"
    internal_unit: "solRad2/d2"
    latex: "\\sigma_J^2"
    description: "Jitter Variance"
  jitter:
    unit: "m/s"
    internal_unit: "solRad/d"
    latex: "\\sigma_J"
    description: "Jitter"
    expressions:
      default:
        func_name: "calc_jitter"
        deps: [ "jitter_variance" ]
  detrend_coeffs:
    initval: 0.0
    init_scale: 0.1
    lower: -1.0e6
    upper: 1.0e6
    unit: ""
    internal_unit: ""
    latex: "c"
    description: "Detrending Coefficients"