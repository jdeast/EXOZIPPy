run:
  name: "kelt4_rv_only"

data:
  rv:
    instruments:
      - name: EXPERT
        file: "KELT-4b.EXPERT.rv"
      - name: FIES
        file: "KELT-4b.FIES.rv"
      - name: HIRES
        file: "KELT-4b.HIRES.rv"
      - name: TRES
        file: "KELT-4b.TRES.rv"

model:
  planets:
    - name: b

parameters:
  file: "kelt4.params_obsolete.yaml"

sampler:
  backend: "pymc"
  pymc:
    draws: 100
    tune: 100
    chains: 4
    target_accept: 0.9
    init: "adapt_diag"
