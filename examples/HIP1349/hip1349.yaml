run:
  name: "HIP1349"

prefix: "fitresults/HIP1349"
logger_level: INFO

# HIP 1349 (HD 1273): real Hipparcos 1-D epoch astrometry (the 1997
# Intermediate Astrometric Data) of a G8V star with a 411-day DMSA/O
# photocenter orbit.  See get_hipparcos_iad.py and README.md.
# Photocenter-only (no RVs): (Omega, omega) <-> (Omega+180, omega+180) is
# exactly degenerate, so Omega is restricted to [0, 180] deg and the
# DMSA/O starting point (Omega = 352.6) is automatically remapped to its
# degenerate partner.  The companion is assumed dark (the fit describes
# the photocenter orbit).

star:
  - name: "A"
    mist: False

planet:
  - name: "B"

orbit:
  - name: "B"

astrometryinstrument:
  - name: "Hipparcos"
    file: "HIP1349.Hipparcos.astrom"
    mode: "gaia"                 # 1-D along-scan epoch astrometry
    observer_location: "earth"   # Hipparcos: geocentric to ~3e-4 AU
    epoch: 2448349.0625          # J1991.25, reference epoch of ra/dec

parameter_file: "hip1349.params.yaml"

sampler:
  method: numpyro
  tune: 2000
  draws: 4000
  chains: 4
  cores: 4
  init: adapt_diag
  target_accept: 0.95
  recompute_trace: True
