# From Yee+2014, Table 1
# https://iopscience.iop.org/article/10.1088/0004-637X/802/2/76/pdf
# eventually, we'd like to get this from MMEXOFAST
lens.Lens.t_0:
    initval: 2456836.22
lens.Lens.u_0:
    initval: 0.922
    init_scale: 0.0004
lens.Lens.t_E:
    initval: 22.87
lens.Lens.pi_E_N:
    initval: -0.248
lens.Lens.pi_E_E:
    initval: 0.234

# the solver needs this, but it shouldn't
#star.Lens.mass:
#    initval: 0.23

# From Yee+2014 Table 3: F_S,OGLE=13.2, F_B,OGLE=-2.19 → q = F_S/(F_S+F_B) = 1.199
# Negative blending is common for OGLE difference imaging in the crowded Galactic bulge.
mulensinstrument.OGLE4.q_source:
    initval: 1.199
    init_scale: 0.05

# From Yee+2014 Table 3: F_S,Spitzer=4.31, F_B,Spitzer=-0.08 → q = 4.31/4.23 = 1.019
mulensinstrument.Spitzer.q_source:
    initval: 1.019
    init_scale: 0.05

mulensinstrument.Spitzer.err_scale:
    upper: 1.1
#mulensinstrument.OGLE4.log_f_total:
#    init_scale: 0.001
#mulensinstrument.OGLE4.q_frac:
