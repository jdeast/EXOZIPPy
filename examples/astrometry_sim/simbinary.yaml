run:
  name: "SimBinary"

prefix: "fitresults/SimBinary"
logger_level: INFO

# Fully simulated nearby G+M binary: 2-D absolute astrometry of the
# photocenter (luminous companion, fluxfrac = 0.02) plus relative
# separation/PA measurements of the companion.  No RVs: the
# (Omega, omega) -> (Omega+180, omega+180) degeneracy is unbroken, and the
# fit starts at the injected mode.  See simulate_astrometry.py.

star:
  - name: "G"
    mist: False

planet:
  - name: "M"

orbit:
  - name: "M"

astrometryinstrument:
  - name: "GroundAbs"
    file: "SimBinary.Ground.abs.astrom"
    mode: "abs"
    observer_location: "earth"
    epoch: 2457800.0
  - name: "GroundRel"
    file: "SimBinary.Ground.rel.astrom"
    mode: "rel"
    planet_ndx: 0

parameter_file: "simbinary.params.yaml"

sampler:
  method: numpyro
  tune: 2000
  draws: 4000
  chains: 4
  cores: 4
  init: adapt_diag
  target_accept: 0.95
