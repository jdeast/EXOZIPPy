run:
  name: "OB08092"

prefix: "fitresults/OB08092_pspl_op"

# 1. Define the physical bodies!
star:
  - name: "Lens"
  - name: "Source"

lens:
  - name: "Lens"
    finite_source: False
    #mag_method: "auto_vbbl" # default = auto_vbbl, but accepts anything MuLensModel does: point_source, point_source_approx, vbbl, adaptive_contour, hexadecapole, quadrupole, ray_shooting
    # Map the lens and source to the star vector
    lens_ndx: 0
    source_ndx: 1
    t0_par: 2455379.571
    # by default, for PSPL fits, we use our pytensor implementation of the Paczynski curve, which allows use of NUTS and is significantly faster
    # Set use_op: True to use the MuLensModel version, but you'll want to change the sampler to one that doesn't require gradients.
    use_op: False

galacticmodel:
  - name: "OB08092"
    anchor_idx: 1

mulensinstrument:
  - name: "OGLE4"
    file: "n20100309.I.OGLE4.ob08092.dat"
    filter: "I"
    zero_point: ""

parameter_file: "ob08092.params.yaml"

sampler:
  pymc:
    tune: 1000 # generally need longer tuning for mulensing
    draws: 1000
    chains: 4
    cores: 4
    init: "adapt_diag"
    target_accept: 0.99
    check_curvatures: False
    recompute_trace: True