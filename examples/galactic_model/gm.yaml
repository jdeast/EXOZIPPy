run:
  name: "SingleStarPriorTest"

prefix: "fitresults/single_star_test"

star:
  - name: "BulgeTarget"
    mist: False

galacticmodel:
  - name: "MW_Prior"
    star_ndx: 0

parameter_file: "gm.params.yaml"

sampler:
  method: nuts
  tune: 2000
  draws: 3000
  chains: 4
  cores: 1
  init: adapt_diag
  target_accept: 0.99
  check_curvatures: True
  recompute_trace: True