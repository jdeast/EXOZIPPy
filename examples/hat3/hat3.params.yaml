# this is always helpful and comes from high resolution spectroscopy
star.feh:  
    initval: 0.27
    sigma: 0.08

# the sigma is only necessary because we're not fiting an evolutionary model
# it should be removed in a final run
star.mass:
    initval: 0.92
    sigma: 0.05

# we can measure this from spectroscopy, but typically SED + transit is more direct
# so we're just going to seed it at the spectroscopic value
star.teff: 
    initval: 5190.0

star.radius:
    initval: 0.85

# this comes from a galactic dust map (see scripts/mkticsed.py)
star.av:  
    upper: 0.096687450

# NOTE: the Gaia DR3 parallax uncertainty (0.0143000) has been added in quadrature with 0.01 to account for remaining systematic residuals
star.parallax:
    initval: 7.45278
    sigma: 0.01745