run:
  name: "hat3"

prefix: "fitresults/HAT-P-3b_numpyro"

star:
  - name: "A"
    mist: False
    sed: "NextGen" # or name model: "NextGen" [MISTv1, MISTv2]

#parameter_file: "hat3.params.yaml"
parameter_file: "hat3.params.2.yaml"

sed:
  path: "*.sed.*"
  file: "hat3_sed.yaml"

sampler:
  method: numpyro         # nuts, numpyro, blackjax, ptde
  tune: 500
  draws: 1000
  chains: 4
  cores: 4
  init: adapt_diag
  target_accept: 0.95
  check_curvatures: False
  recompute_trace: True
  profile: False