run:
  name: "kelt4"

prefix: "fitresults/KELT-4A"
logger_level: INFO   # DEBUG, INFO, or WARNING

# the order of the components here is the order they are output in the table

star:
  - name: "A"
    mist: False
  - name: "B"
    mist: False
  - name: "C"
    mist: False

sed:
  file: "kelt4.sed.yaml"

planet:
  - name: "b"

# Hierarchical triple + planet: b orbits A, B orbits C, and the B+C pair
# orbits A(+b).  primary/companion entries name stars/planets (or
# "star.X"/"planet.X" paths); a multi-body group is treated as a point
# mass at its barycenter.  Each orbit derives m_primary/m_companion/
# m_total/arsun/K from the same star.mass/planet.mass nodes, so the three
# orbits are automatically mass-consistent.
orbit:
  - name: "b"
    primary: ["A"]
    companion: ["b"]
  - name: "BC"
    primary: ["C"]
    companion: ["B"]
  - name: "A-BC"
    primary: ["A", "b"]
    companion: ["B", "C"]

# Relative astrometry: each dataset traces one orbit (companion group
# relative to primary group, PA East of North).  The A-BC data follow the
# photocenter of the unresolved B+C pair; band: "V" lets the SED weigh the
# B-vs-C fluxes for the nested photocenter wobble of the BC orbit.
astrometryinstrument:
  - name: "BC"
    file: "KELT-4_B-C.rel.dat"
    mode: "rel"
    orbit: "BC"
    sep_unit: "mas"
  - name: "ABC"
    file: "KELT-4_A-BC.rel.dat"
    mode: "rel"
    orbit: "A-BC"
    sep_unit: "arcsec"
    band: "V"

transit:
  - name: "TESS_S48"
    file: "n20220130.TESS.TESS.TIC165297570.S48.0120.SPOC.dat"
    band: "TESS"
    exptime: 2.0 # exposure time in minutes
    ninterp: 1.0 # number of model points to compute for each data point to account for long cadence smearing. Defaults to 1 point/3 minutes
#    fitspline: False
#    splinespace: 0.75

band:
  - name: "TESS"
    filter: "TESS"
  - name: "V"
    filter: "V"

rvinstrument:
  #- name: "EXPERT"
  #  file: "KELT-4b.EXPERT.rv"
  #- name: "FIES"
  #  file: "KELT-4b.FIES.rv"
  - name: "HIRES"
    file: "KELT-4b.HIRES.rv"
  - name: "TRES"
    file: "KELT-4b.TRES.rv"

parameter_file: "kelt4_sed.params.yaml"
#parameter_file: "kelt4.params.2.yaml" # automatically generated from a previous run and starts at the MAP

sampler:
  method: nuts         # numpyro/blackjax can't differentiate the transit limb-darkening op; use nuts, nutpie, or ptde
  tune: 2000
  draws: 4000
#  chains: 4
#  cores: 4
  init: adapt_diag
  target_accept: 0.95
  check_curvatures: False
  recompute_trace: True   # if False and a prefix.nc file exists, load it instead of re-sampling
  profile: False