# TIC 165297570 = KELT-4A, wired in as the 3-star (A, B, C) SED deblend.
#
# KELT-4A is in the Washington Double Star catalog (sep 1.6", WDS mag2=12.99)
#   -- that companion is the unresolved B+C pair.
# Gaia (resolution ~0.4") resolves A cleanly at this separation/delta-mag,
#   consistent with RUWE = 1.0230 (not elevated) -- pos: [A].
# 2MASS (~2-4") and WISE (~6") cannot resolve a 1.6" pair -- genuinely
#   A+B+C blended, so they keep the default photType (blend of all stars).
# Gaia DR3 photometry used with GAIA/GAIA2r filter curves (DR2); differences are <1 mmag for typical stars
# GALEX: atmospheric models are unreliable in the UV

model: NextGen
nstars: 3   # A, B, C
filters:
    - name: "GAIA/GAIA2r.G"
      mag: 9.965562
      err: 0.02
      photType:
        pos: [A]

    - name: "GAIA/GAIA2r.Gbp"
      mag: 10.165902
      err: 0.02
      photType:
        pos: [A]

    - name: "GAIA/GAIA2r.Grp"
      mag: 9.514663
      err: 0.02
      photType:
        pos: [A]

    - name: "2MASS/2MASS.J"
      mag: 9.017
      err: 0.021

    - name: "2MASS/2MASS.H"
      mag: 8.79
      err: 0.023

    - name: "2MASS/2MASS.Ks"
      mag: 8.689
      err: 0.02

    - name: "WISE/WISE.W1"
      mag: 8.604
      err: 0.03

    - name: "WISE/WISE.W2"
      mag: 8.636
      err: 0.03

    - name: "WISE/WISE.W3"
      mag: 8.637
      err: 0.03

    - name: "WISE/WISE.W4"
      mag: 8.6
      err: 0.387

    # Resolved B-vs-C differential magnitude: components appear about
    # equally bright in Fig. 8 (Eastman+2016 discovery paper), same NIRC2
    # Kp AO frame as the KA/KBC photometry in KELT-4_A-BC.rel.dat. Very
    # loose by-eye estimate, not a formal measurement.
    - name: "Keck/NIRC2.Kp"
      mag: 0.0
      err: 0.5
      photType:
        pos: [B]
        neg: [C]

    # A-(B+C) differential photometry, historical astrometry/photometry
    # table (Eastman+2016 and refs therein; see KELT-4_A-BC.rel.dat for the
    # full table with sources). mag = m_A - m_BC (pos: [A], neg: [B, C]).
    # WARNING: no uncertainty was published for any of these mag_A/mag_BC
    # values -- err below is a PLACEHOLDER; replace with real values.
    # WARNING: the two 1972 V rows are suspiciously round (9.500/14.000)
    # and disagree with the later, more precise-looking V rows by >2 mag
    # (-4.5 vs ~-2.2 to -2.95) -- likely crude early visual/photographic
    # estimates. Consider dropping or heavily down-weighting them.
    - name: "Generic/Bessell.V"
      mag: -4.500
      err: 0.5
      photType:
        pos: [A]
        neg: [B, C]
      # 1972.230, source 1

    - name: "Generic/Bessell.V"
      mag: -4.500
      err: 0.5
      photType:
        pos: [A]
        neg: [B, C]
      # 1972.249, source 1

    - name: "Generic/Bessell.V"
      mag: -2.240
      err: 0.1
      photType:
        pos: [A]
        neg: [B, C]
      # 1987.430, source 2

    - name: "Generic/Bessell.V"
      mag: -2.806
      err: 0.1
      photType:
        pos: [A]
        neg: [B, C]
      # 1991.250, source 3

    - name: "Generic/Bessell.V"
      mag: -2.950
      err: 0.1
      photType:
        pos: [A]
        neg: [B, C]
      # 1991.530, source 4 (matches WDS mag1/mag2 10.040/12.99)

    - name: "Generic/Cousins.R"
      mag: -2.150
      err: 0.1
      photType:
        pos: [A]
        neg: [B, C]
      # 1987.430, source 2

    # 2012.3464, source 5 (same high-res AO epoch as the Kp B-C row above
    # and the tight sep/PA rows in KELT-4_A-BC.rel.dat / KELT-4_B-C.rel.dat;
    # assuming NIRC2 J to match the Kp filter, not verified)
    - name: "Keck/NIRC2.J"
      mag: -1.747
      err: 0.05
      photType:
        pos: [A]
        neg: [B, C]

    - name: "Keck/NIRC2.Kp"
      mag: -1.378
      err: 0.05
      photType:
        pos: [A]
        neg: [B, C]
      # 2012.3464, source 5

