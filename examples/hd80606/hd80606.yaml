run:
  name: "hd80606"

prefix: "fitresults/HD80606"

star:
  - name: "A"
    mist: False

planet:
  - name: "b"

orbit:
  - name: "b"
    primary: ["A"]
    companion: ["b"]

rvinstrument:
  - name: "HIRES"
    file: "HD80606.HIRES.SIMULATED.rv"
parameter_file: "hd80606.params.yaml"

sampler:
  method: numpyro         # nuts, numpyro, blackjax, ptde
  tune: 2000
  draws: 4000
  chains: 4
  cores: 4
  init: adapt_diag
  target_accept: 0.95
  check_curvatures: True  # expensive but worthwhile the first time, or after major input changes
  recompute_trace: True
  profile: False